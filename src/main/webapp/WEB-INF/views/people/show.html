<!DOCTYPE html>
<html lang="en" xmlns::th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Person</title>
</head>
<body>

<div>
    <a th:text="${person.getId()}">value</a>-
    <a th:text="${person.getName()}">value</a>,
    <a th:text="${person.getAge()}">value</a>,
    <a th:text="${person.getEmail()}">value</a>
</div>

<br>
<hr>

<a th:href="@{/people/{id}/edit(id=${person.getId()})}">Edit</a>
<a th:href="@{/people/{id}/delete(id=${person.getId()})}">Delete</a>

</body>
</html>
